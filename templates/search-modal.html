{{define "search-modal"}}
<style>
  #search-button {
    position: fixed;
    top: 1rem;
    right: 1rem;
    padding: 0.5rem 1rem;
    z-index: 1000;
    cursor: pointer;
  }

  #search-modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.5);
    z-index: 2000;
    align-items: flex-start;
    justify-content: center;
    padding-top: 10vh;
  }

  #search-modal.active {
    display: flex;
  }

  #search-modal-content {
    background: var(--pico-background-color);
    border-radius: var(--pico-border-radius);
    width: 90%;
    max-width: 600px;
    max-height: 70vh;
    box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    display: flex;
    flex-direction: column;
    position: relative;
  }

  #search-close-button {
    position: absolute;
    top: 0.5rem;
    right: 0.5rem;
    background: none;
    border: none;
    font-size: 1.5rem;
    cursor: pointer;
    padding: 0.25rem 0.5rem;
    line-height: 1;
    z-index: 1;
  }

  #search-close-button:hover {
    opacity: 0.7;
  }

  #search-input {
    margin: 0;
    border-bottom: 1px solid var(--pico-muted-border-color);
    border-radius: var(--pico-border-radius) var(--pico-border-radius) 0 0;
  }

  #search-results {
    overflow-y: auto;
    max-height: calc(70vh - 60px);
    padding: 0;
    margin: 0;
    list-style: none;
  }

  #search-results li {
    padding: 0.75rem 1rem;
    cursor: pointer;
    border-bottom: 1px solid var(--pico-muted-border-color);
  }

  #search-results li:hover,
  #search-results li.selected {
    background: var(--pico-primary-background);
  }

  #search-results li:last-child {
    border-bottom: none;
  }

  #search-status {
    padding: 1rem;
    text-align: center;
    color: var(--pico-muted-color);
  }
</style>

<button id="search-button" aria-label="Search files">🔍</button>

<div id="search-modal">
  <div id="search-modal-content">
    <button id="search-close-button" aria-label="Close search">×</button>
    <input type="text" id="search-input" placeholder="Search files..." autocomplete="off">
    <ul id="search-results" role="listbox"></ul>
    <div id="search-status"></div>
  </div>
</div>

<script>
(function() {
  const modal = document.getElementById('search-modal');
  const button = document.getElementById('search-button');
  const closeButton = document.getElementById('search-close-button');
  const input = document.getElementById('search-input');
  const results = document.getElementById('search-results');
  const status = document.getElementById('search-status');

  let fileCache = null;
  let currentRef = null;
  let selectedIndex = -1;

  // Get current ref from page context
  function getCurrentRef() {
    // For repo page, try to get HEAD
    const headElement = document.querySelector('[data-head]');
    if (headElement) {
      return headElement.getAttribute('data-head');
    }
    // For tree/blob pages, get from breadcrumb or URL
    const pathParts = window.location.pathname.split('/');
    const tIndex = pathParts.indexOf('t');
    const bIndex = pathParts.indexOf('b');
    if (tIndex > 0 && pathParts.length > tIndex + 1) {
      return pathParts[tIndex + 1];
    }
    if (bIndex > 0 && pathParts.length > bIndex + 1) {
      return pathParts[bIndex + 1];
    }
    return 'main'; // fallback
  }

  // Get repository name from URL
  function getRepoName() {
    const pathParts = window.location.pathname.split('/');
    const rIndex = pathParts.indexOf('r');
    if (rIndex >= 0 && pathParts.length > rIndex + 1) {
      return pathParts[rIndex + 1];
    }
    return null;
  }

  // Open modal
  function openModal() {
    currentRef = getCurrentRef();
    modal.classList.add('active');
    input.focus();

    if (!fileCache) {
      loadFileList();
    }
  }

  // Close modal
  function closeModal() {
    modal.classList.remove('active');
    input.value = '';
    results.innerHTML = '';
    status.textContent = '';
    selectedIndex = -1;
  }

  // Load file list from API
  async function loadFileList() {
    const repoName = getRepoName();
    if (!repoName) {
      status.textContent = 'Error: Repository not found';
      return;
    }

    status.textContent = 'Loading files...';

    try {
      const response = await fetch(`/r/${repoName}/api/files?ref=${encodeURIComponent(currentRef)}`);
      if (!response.ok) {
        throw new Error(`HTTP error! status: ${response.status}`);
      }
      const data = await response.json();
      fileCache = data.files || [];
      status.textContent = '';
      performSearch();
    } catch (error) {
      console.error('Failed to load file list:', error);
      status.textContent = 'Error: Failed to load files';
    }
  }

  // Perform search
  function performSearch() {
    const query = input.value.toLowerCase().trim();
    results.innerHTML = '';
    selectedIndex = -1;

    if (!fileCache) {
      return;
    }

    if (query === '') {
      status.textContent = `${fileCache.length} files available`;
      return;
    }

    const matches = fileCache.filter(file =>
      file.toLowerCase().includes(query)
    ).slice(0, 50); // Limit to 50 results

    if (matches.length === 0) {
      status.textContent = 'No files found';
      return;
    }

    status.textContent = `${matches.length} file${matches.length > 1 ? 's' : ''} found`;

    matches.forEach((file, index) => {
      const li = document.createElement('li');
      li.textContent = file;
      li.setAttribute('role', 'option');
      li.addEventListener('click', () => navigateToFile(file));
      results.appendChild(li);
    });
  }

  // Navigate to file
  function navigateToFile(filePath) {
    const repoName = getRepoName();
    if (repoName) {
      window.location.href = `/r/${repoName}/b/${currentRef}/${filePath}`;
    }
  }

  // Keyboard navigation
  function updateSelection(newIndex) {
    const items = results.querySelectorAll('li');
    if (items.length === 0) return;

    if (selectedIndex >= 0 && selectedIndex < items.length) {
      items[selectedIndex].classList.remove('selected');
    }

    selectedIndex = Math.max(0, Math.min(newIndex, items.length - 1));
    items[selectedIndex].classList.add('selected');
    items[selectedIndex].scrollIntoView({ block: 'nearest' });
  }

  // Event listeners
  button.addEventListener('click', openModal);
  closeButton.addEventListener('click', closeModal);

  modal.addEventListener('click', (e) => {
    if (e.target === modal) {
      closeModal();
    }
  });

  input.addEventListener('input', performSearch);

  input.addEventListener('keydown', (e) => {
    const items = results.querySelectorAll('li');

    if (e.key === 'Escape') {
      closeModal();
    } else if (e.key === 'ArrowDown') {
      e.preventDefault();
      if (items.length > 0) {
        updateSelection(selectedIndex + 1);
      }
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      if (items.length > 0) {
        updateSelection(selectedIndex - 1);
      }
    } else if (e.key === 'Enter') {
      e.preventDefault();
      if (selectedIndex >= 0 && selectedIndex < items.length) {
        const filePath = items[selectedIndex].textContent;
        navigateToFile(filePath);
      }
    }
  });

  // Keyboard shortcut
  document.addEventListener('keydown', (e) => {
    if ((e.key === '/' || (e.ctrlKey && e.key === 'k')) &&
        e.target.tagName !== 'INPUT' &&
        e.target.tagName !== 'TEXTAREA') {
      e.preventDefault();
      openModal();
    }
  });
})();
</script>
{{end}}
